<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0a10"/>
      <stop offset="100%" stop-color="#0f0508"/>
    </linearGradient>
    <linearGradient id="ring" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b76e79"/>
      <stop offset="100%" stop-color="#722f37"/>
    </linearGradient>
    <linearGradient id="chain" x1="20" y1="32" x2="44" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e2a76f"/>
      <stop offset="100%" stop-color="#b76e79"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="url(#ring)" stroke-width="2.5"/>
  <!-- Scale/Balance icon representing justice -->
  <g transform="translate(32,18)">
    <!-- Top pivot -->
    <circle cx="0" cy="0" r="2.5" fill="url(#chain)"/>
    <!-- Beam -->
    <line x1="-14" y1="4" x2="14" y2="4" stroke="url(#chain)" stroke-width="2" stroke-linecap="round"/>
    <!-- Left chain -->
    <line x1="-14" y1="4" x2="-14" y2="16" stroke="#b76e79" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Right chain -->
    <line x1="14" y1="4" x2="14" y2="16" stroke="#b76e79" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Left pan -->
    <path d="M-20,16 Q-14,22 -8,16" stroke="#e2a76f" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Right pan -->
    <path d="M8,16 Q14,22 20,16" stroke="#e2a76f" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Center pole -->
    <line x1="0" y1="0" x2="0" y2="26" stroke="url(#chain)" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Base -->
    <line x1="-6" y1="26" x2="6" y2="26" stroke="#b76e79" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Heart accent -->
  <path d="M26,12 C24,9 20,9.5 20,12.5 C20,15 26,19 26,19 C26,19 32,15 32,12.5 C32,9.5 28,9 26,12Z" fill="#b76e79" opacity="0.6" transform="translate(6,-2) scale(0.5)"/>
</svg>
